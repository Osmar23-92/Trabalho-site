<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/cuplogo.png" type="image/x-icon">
    <title>Doces Cupcakes</title>
    <style>
    body { margin: 0; 
        font-family: 'Segoe UI', sans-serif; 
        background-color: #fdf6f9; 
    }
    .navbar {
        position: fixed;
        top: 0; 
        left: 0; 
        width: 100%;
        background-color: hsl(32, 89%, 41%);
        display: flex; 
        justify-content: space-around; 
        align-items: center;
        padding: 15px 0; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        z-index: 1000;
    }
    /* Estilo geral */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #fdf6f9;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
}

/* Container principal */
div {
    margin-top: 100px; /* espaço para a navbar fixa */
    background-color: #fff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    max-width: 400px;
    width: 100%;
}

/* Título */
h1 {
    text-align: center;
    color: hsl(32, 89%, 41%);
    margin-bottom: 20px;
}

/* Labels */
label {
    font-weight: bold;
    color: #333;
    display: block;
    margin-bottom: 5px;
}

/* Inputs */
input[type="text"], 
input[type="email"], 
input[type="tel"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    transition: border-color 0.3s;
}

input[type="text"]:focus, 
input[type="email"]:focus, 
input[type="tel"]:focus {
    border-color: hsl(32, 89%, 41%);
    outline: none;
}

/* Botão */
input[type="submit"] {
    width: 100%;
    background-color: hsl(32, 89%, 41%);
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s;
    

}

input[type="submit"]:hover {
    background-color: hsl(32, 89%, 35%);
}

    </style>
</head>
<body>
    <div>
        <h1>Cadastro de Clientes</h1>
  <form id="cadastroForm">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br><br>

    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" name="telefone"><br><br>

    

    <input type="submit" value="Cadastrar">
  </form>
       
    </div>
    
    <script>
    const form = document.getElementById("cadastroForm");

    form.addEventListener("submit", function(event) {
      event.preventDefault(); // evita recarregar a página

      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const telefone = document.getElementById("telefone").value;
      

      // Aqui você poderia salvar em localStorage para simular persistência
      const cliente = { nome, email, telefone,  };
      let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
      clientes.push(cliente);
      localStorage.setItem("clientes", JSON.stringify(clientes));

      // Depois do cadastro, redireciona para a página principal
      window.location.href = "index.html"; 
    });
  </script>
</body>
</html>
